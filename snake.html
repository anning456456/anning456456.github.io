<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>贪食蛇</title>
<style>
  body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #eee; }
  canvas { border: 2px solid #0f3460; background: #16213e; }
  #info { margin-bottom: 12px; font-size: 18px; }
  #msg { margin-top: 12px; font-size: 14px; color: #aaa; }
</style>
</head>
<body>
<div id="info">分数: <span id="score">0</span></div>
<canvas id="c" width="400" height="400"></canvas>
<div id="msg">方向键 / WASD 控制 | 空格键暂停/开始</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const SIZE = 20, COLS = 20, ROWS = 20;

let snake, dir, next, food, score, running, paused, loop;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; next = {x:1,y:0};
  score = 0; scoreEl.textContent = 0;
  placeFood();
  running = true; paused = false;
  clearInterval(loop);
  loop = setInterval(tick, 120);
}

function placeFood() {
  do { food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===food.x && s.y===food.y));
}

function tick() {
  if (paused) return;
  dir = next;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    clearInterval(loop); running = false;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,400,400);
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', 200, 185);
    ctx.font = '18px monospace';
    ctx.fillStyle = '#eee';
    ctx.fillText('空格键重新开始', 200, 225);
    return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) { score++; scoreEl.textContent=score; placeFood(); }
  else snake.pop();
  draw();
}

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0,0,400,400);
  // food
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(food.x*SIZE+SIZE/2, food.y*SIZE+SIZE/2, SIZE/2-2, 0, Math.PI*2);
  ctx.fill();
  // snake
  snake.forEach((s,i) => {
    ctx.fillStyle = i===0 ? '#0f9b58' : '#1db954';
    ctx.fillRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2);
  });
}

document.addEventListener('keydown', e => {
  const map = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
               w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},
               W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}};
  if (e.key === ' ') {
    if (!running) { init(); return; }
    paused = !paused; return;
  }
  const d = map[e.key];
  if (d && !(d.x===-dir.x && d.y===-dir.y)) next = d;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});

init();
</script>
</body>
</html>
