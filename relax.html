<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅趣解压 · 中国风</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "STKaiti", "KaiTi", "FangSong", "Songti SC", "Noto Serif SC", serif;
    overflow: hidden;
    height: 100vh;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(244, 226, 196, 0.7) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 80%, rgba(228, 198, 208, 0.55) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 10%, rgba(175, 221, 234, 0.4) 0%, transparent 50%),
      linear-gradient(135deg, #f5e6d3 0%, #ead8bb 50%, #d4b896 100%);
    cursor: crosshair;
    user-select: none;
    transition: background 2.4s ease, filter 2.4s ease;
  }

  /* 落英 · 庭院氛围 */
  body.dusk {
    background: linear-gradient(180deg, #e8ddd0 0%, #f0e8dc 40%, #e6ddd2 70%, #d4cbbf 100%);
  }

  /* 宣纸纹理 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(0deg, rgba(139,115,85,0.03) 0px, transparent 1px, transparent 3px),
      repeating-linear-gradient(90deg, rgba(139,115,85,0.03) 0px, transparent 1px, transparent 3px);
    z-index: 1;
    transition: opacity 2.4s ease;
  }

  body.dusk::before { opacity: 0.5; }

  /* 暗角 vignette */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 4;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(60, 50, 40, 0.3) 100%);
    opacity: 0;
    transition: opacity 2.4s ease;
  }
  body.dusk .vignette { opacity: 1; }

  /* 庭院画 */
  .garden-scene {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    opacity: 0;
    transition: opacity 2s ease 0.3s;
  }
  body.dusk .garden-scene { opacity: 1; }

  /* 花簇随风轻摆 */
  .blossom-cluster { transform-box: fill-box; }
  .blossom-cluster path { transform-box: fill-box; transform-origin: center center; }
  .sway-1 { animation: sway1 4s ease-in-out infinite; transform-origin: center bottom; }
  .sway-2 { animation: sway2 5s ease-in-out infinite; transform-origin: center bottom; }
  .sway-3 { animation: sway3 4.5s ease-in-out infinite; transform-origin: center bottom; }

  @keyframes sway1 {
    0%, 100% { transform: rotate(0deg) translateX(0); }
    30% { transform: rotate(0.8deg) translateX(1.5px); }
    70% { transform: rotate(-0.5deg) translateX(-1px); }
  }
  @keyframes sway2 {
    0%, 100% { transform: rotate(0deg) translateX(0); }
    40% { transform: rotate(-0.7deg) translateX(-1.2px); }
    80% { transform: rotate(0.6deg) translateX(1px); }
  }
  @keyframes sway3 {
    0%, 100% { transform: rotate(0deg) translateX(0); }
    25% { transform: rotate(0.5deg) translateX(0.8px); }
    60% { transform: rotate(-0.9deg) translateX(-1.5px); }
  }

  /* 庭院模式下的 UI 适配 */
  body.dusk h1 { color: #5a3a2e; text-shadow: 0 1px 0 rgba(255,255,255,0.5); }
  body.dusk .subtitle { color: #7d5a44; }
  body.dusk .modes button { background: rgba(255, 250, 240, 0.55); color: #5a3a2e; border-color: rgba(90, 58, 46, 0.35); }
  body.dusk .modes button.active { background: #5a3a2e; color: #fdf6e8; border-color: #5a3a2e; }
  body.dusk .hint { background: rgba(255, 250, 240, 0.55); color: #5a3a2e; border-left-color: #8b3a3a; }
  body.dusk .clear-btn { background: rgba(255, 250, 240, 0.55); color: #5a3a2e; border-color: rgba(90, 58, 46, 0.35); }
  body.dusk .clear-btn:hover { background: #5a3a2e; color: #fdf6e8; }
  body.dusk .corner-deco.tr { border-color: #5a3a2e; opacity: 0.6; }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 5;
  }

  .ui {
    position: fixed;
    top: 36px;
    left: 36px;
    z-index: 10;
    pointer-events: none;
  }

  .ui > * { pointer-events: auto; }

  h1 {
    font-size: 36px;
    font-weight: normal;
    letter-spacing: 12px;
    color: #6d2b3a;
    margin-bottom: 4px;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
  }

  .subtitle {
    font-size: 13px;
    color: #8b6f47;
    letter-spacing: 6px;
    margin-bottom: 26px;
    opacity: 0.85;
  }

  .modes {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    max-width: 380px;
  }

  .modes button {
    padding: 9px 18px;
    border: 1px solid rgba(109, 43, 58, 0.35);
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #6d2b3a;
    font-family: inherit;
    font-size: 16px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 2px;
  }

  .modes button:hover {
    background: rgba(230, 0, 18, 0.12);
    transform: translateY(-2px);
  }

  .modes button.active {
    background: #6d2b3a;
    color: #f5e6d3;
    border-color: #6d2b3a;
    box-shadow: 0 4px 14px rgba(109, 43, 58, 0.35);
  }

  .hint {
    font-size: 13px;
    color: #5c4a36;
    letter-spacing: 3px;
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 10px 16px;
    display: inline-block;
    border-left: 3px solid #6d2b3a;
    max-width: 360px;
    line-height: 1.8;
  }

  .clear-btn {
    position: fixed;
    bottom: 36px;
    right: 36px;
    z-index: 10;
    padding: 12px 26px;
    border: 1px solid rgba(74, 66, 102, 0.4);
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #4a4266;
    font-family: inherit;
    font-size: 16px;
    letter-spacing: 6px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .clear-btn:hover {
    background: #4a4266;
    color: #f5e6d3;
    transform: translateY(-2px);
  }

  .seal {
    position: fixed;
    bottom: 40px;
    left: 40px;
    width: 76px;
    height: 76px;
    background: #c1272d;
    color: #f5e6d3;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 0;
    line-height: 1;
    border-radius: 4px;
    transform: rotate(-6deg);
    box-shadow: 0 6px 18px rgba(193, 39, 45, 0.45);
    font-family: "FangSong", "STFangsong", serif;
    pointer-events: none;
    z-index: 10;
  }

  .seal::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1.5px solid #f5e6d3;
    border-radius: 2px;
  }

  .seal span {
    position: relative;
    z-index: 1;
    margin: 1px 0;
  }

  .corner-deco {
    position: fixed;
    width: 60px;
    height: 60px;
    z-index: 5;
    pointer-events: none;
    opacity: 0.5;
  }
  .corner-deco.tr { top: 24px; right: 24px; border-top: 2px solid #6d2b3a; border-right: 2px solid #6d2b3a; }
  .corner-deco.bl { bottom: 24px; left: 24px; border-bottom: 2px solid #6d2b3a; border-left: 2px solid #6d2b3a; }
</style>
</head>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 中国传统色彩
const colors = {
  inks: ['#1a1a1a', '#2c2c2c', '#3d3d4a', '#4a4266', '#1c2938', '#392f41'],
  petals: ['#f47983', '#ee4866', '#e4c6d0', '#f0a1a8', '#ffb3a7', '#fbc4ab', '#c83c23'],
  fireworks: ['#e60012', '#f0c239', '#afdd22', '#5089b7', '#9d2933', '#fff143', '#ed5736', '#fcef8d', '#7bcfa6'],
  ripples: ['#5089b7', '#3b818c', '#7bcfa6', '#88ada6', '#4b5cc4'],
  blooms: {
    petal: ['#f47983', '#ee4866', '#e4c6d0', '#9d2933', '#ffb3a7', '#c83c23'],
    center: ['#f0c239', '#fff143', '#fcef8d', '#e29c45']
  }
};

let particles = [];
let mode = 'ink';
let isDrawing = false;
let lastX = 0, lastY = 0;
let lastTime = 0;

const hints = {
  ink: '按住鼠标，挥毫泼墨',
  petals: '按住鼠标，天女散花',
  firework: '点击屏幕，烟花绽放',
  ripple: '点击水面，涟漪荡漾',
  bloom: '点击大地，花开锦簇'
};

// ========== 水墨 ==========
function drawInk(x, y, lx, ly, speed) {
  const color = colors.inks[Math.floor(Math.random() * colors.inks.length)];
  const thickness = Math.max(2, 20 - speed * 0.5);

  ctx.strokeStyle = color;
  ctx.lineWidth = thickness;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.globalAlpha = 0.75;
  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.lineTo(x, y);
  ctx.stroke();

  // 墨晕散开
  if (Math.random() < 0.5) {
    for (let i = 0; i < 4; i++) {
      const ox = (Math.random() - 0.5) * thickness * 2.5;
      const oy = (Math.random() - 0.5) * thickness * 2.5;
      ctx.globalAlpha = Math.random() * 0.35;
      ctx.beginPath();
      ctx.arc(x + ox, y + oy, Math.random() * 2.5 + 0.5, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }
  }

  // 飞白效果
  if (speed > 30 && Math.random() < 0.4) {
    ctx.globalAlpha = 0.2;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(lx + (Math.random() - 0.5) * thickness, ly + (Math.random() - 0.5) * thickness);
    ctx.lineTo(x + (Math.random() - 0.5) * thickness, y + (Math.random() - 0.5) * thickness);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ========== 落英 · 樱花 ==========
const sakuraColors = {
  front: ['#fef0f5', '#fce4ec', '#f8c3cd', '#f4b3c2', '#e8b4c8'],
  back: ['#e8a0b4', '#d4899e', '#c97d92', '#b8687d'],
  rare: ['#c83c50', '#a83248', '#943050']
};

let mouseX = canvas.width / 2, mouseY = canvas.height / 2;
let groundPetals = [];
const MAX_GROUND = 80;

// 预渲染樱花瓣 sprites（解决性能问题）
const SPRITE_SIZE = 48;
const sakuraSprites = { front: [], back: [] };

function buildPetalPath(c, s, widthRatio, notchDepth) {
  const w = s * widthRatio;
  const notch = s * notchDepth;
  c.beginPath();
  c.moveTo(0, -s);
  c.bezierCurveTo(w * 0.6, -s * 0.8, w, -s * 0.2, w * 0.85, s * 0.3);
  c.bezierCurveTo(w * 0.7, s * 0.7, w * 0.3, s * 0.95, notch * 0.3, s - notch * 0.3);
  c.lineTo(0, s - notch);
  c.lineTo(-notch * 0.3, s - notch * 0.3);
  c.bezierCurveTo(-w * 0.3, s * 0.95, -w * 0.7, s * 0.7, -w * 0.85, s * 0.3);
  c.bezierCurveTo(-w, -s * 0.2, -w * 0.6, -s * 0.8, 0, -s);
  c.closePath();
}

function makeSprite(color, isFront) {
  const cv = document.createElement('canvas');
  cv.width = SPRITE_SIZE;
  cv.height = SPRITE_SIZE;
  const c = cv.getContext('2d');
  c.translate(SPRITE_SIZE / 2, SPRITE_SIZE / 2);
  const s = SPRITE_SIZE * 0.42;
  const widthRatio = 0.78;
  const notchDepth = 0.2;

  buildPetalPath(c, s, widthRatio, notchDepth);

  const grad = c.createLinearGradient(0, -s, 0, s);
  grad.addColorStop(0, color);
  grad.addColorStop(0.7, color);
  grad.addColorStop(1, isFront ? 'rgba(200,140,160,0.5)' : 'rgba(160,100,120,0.55)');
  c.fillStyle = grad;
  c.fill();

  // 脉络
  c.globalAlpha = 0.18;
  c.strokeStyle = isFront ? '#d4899e' : '#a06070';
  c.lineWidth = 0.6;
  c.beginPath();
  c.moveTo(0, -s * 0.7);
  c.quadraticCurveTo(s * widthRatio * 0.1, 0, 0, s - s * notchDepth);
  c.stroke();

  return cv;
}

sakuraColors.front.forEach(col => sakuraSprites.front.push({ color: col, img: makeSprite(col, true) }));
sakuraColors.rare.forEach(col => sakuraSprites.front.push({ color: col, img: makeSprite(col, true), rare: true }));
sakuraColors.back.forEach(col => sakuraSprites.back.push({ color: col, img: makeSprite(col, false) }));

class SakuraPetal {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    const r = Math.random();
    this.layer = r < 0.25 ? 'far' : r < 0.75 ? 'mid' : 'near';

    const scale = this.layer === 'far' ? 0.55 : this.layer === 'near' ? 1.35 : 1;
    this.size = (10 + Math.random() * 6) * scale;

    // 天女散花：初速朝向下方扇形散开（更快）
    const angle = Math.PI * 0.5 + (Math.random() - 0.5) * Math.PI * 0.9;
    const initSpeed = 2.5 + Math.random() * 5;
    this.vx = Math.cos(angle) * initSpeed;
    this.vy = Math.sin(angle) * initSpeed;

    const speedScale = this.layer === 'far' ? 0.75 : this.layer === 'near' ? 1.2 : 1;
    this.terminalVy = (2.5 + Math.random() * 1.2) * speedScale;
    this.gravity = 0.098;

    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.08;

    this.flipPhase = Math.random() * Math.PI * 2;
    this.flipSpeed = 0.04 + Math.random() * 0.03;

    this.swingPhase = Math.random() * Math.PI * 2;
    this.swingFreq = 0.04 + Math.random() * 0.03;
    this.swingAmp = 0.8 + Math.random() * 0.6;

    const frontPick = sakuraSprites.front[Math.floor(Math.random() * sakuraSprites.front.length)];
    const backPick = sakuraSprites.back[Math.floor(Math.random() * sakuraSprites.back.length)];
    this.frontImg = frontPick.img;
    this.backImg = backPick.img;
    this.frontColor = frontPick.color;

    this.alpha = this.layer === 'far' ? 0.55 : this.layer === 'near' ? 0.92 : 0.85;
    this.life = 1;
    this.state = 'falling';
    this.groundY = 0;
    this.bounceVy = 0;
    this.fadeTimer = 0;
    this.type = 'sakura';
  }

  update() {
    if (this.state === 'falling') {
      this.swingPhase += this.swingFreq;
      const swing = Math.sin(this.swingPhase) * this.swingAmp;

      this.vy += this.gravity;
      this.vx *= 0.99;
      if (this.vy > this.terminalVy) {
        this.vy = this.terminalVy + (this.vy - this.terminalVy) * 0.85;
      }

      this.x += this.vx + swing * 0.5;
      this.y += this.vy;

      this.flipPhase += this.flipSpeed;
      this.rotation += this.rotSpeed;
      this.rotSpeed *= 0.99;

      const groundLine = canvas.height - 30;
      if (this.y > groundLine) {
        this.state = 'landing';
        this.groundY = this.y;
        this.bounceVy = -1.5 - Math.random() * 1.2;
      }

      if (this.x < -60 || this.x > canvas.width + 60) this.life = 0;

    } else if (this.state === 'landing') {
      this.bounceVy += 0.4;
      this.y += this.bounceVy;
      this.rotation += this.rotSpeed * 0.5;
      this.rotSpeed *= 0.85;
      if (this.y >= this.groundY) {
        this.y = this.groundY;
        this.state = 'grounded';
        this.fadeTimer = 0;
      }
    } else if (this.state === 'grounded') {
      this.fadeTimer++;
      if (this.fadeTimer > 40) {
        this.life -= 0.008;
      }
    }
  }

  draw(ctx) {
    const flip = Math.cos(this.flipPhase);
    const absFlip = Math.abs(flip);
    if (absFlip < 0.05) return;
    const isFront = flip > 0;
    const img = isFront ? this.frontImg : this.backImg;

    ctx.globalAlpha = this.alpha * this.life * (0.65 + absFlip * 0.35);
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    const drawW = this.size * 2 * absFlip;
    const drawH = this.size * 2;
    ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
    ctx.restore();
  }
}

function scatterSakura(cx, cy, count) {
  for (let i = 0; i < count; i++) {
    const ox = (Math.random() - 0.5) * 16;
    const oy = (Math.random() - 0.5) * 12;
    particles.push(new SakuraPetal(cx + ox, cy + oy));
  }
}

// ========== 烟花 ==========
class FireworkParticle {
  constructor(x, y, angle, speed, color) {
    this.x = x;
    this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.color = color;
    this.life = 1;
    this.decay = 0.012 + Math.random() * 0.01;
    this.size = Math.random() * 2 + 1.5;
    this.trail = [];
    this.type = 'firework';
  }
  update() {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 10) this.trail.shift();
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.06;
    this.vx *= 0.985;
    this.vy *= 0.985;
    this.life -= this.decay;
  }
  draw(ctx) {
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      ctx.globalAlpha = (i / this.trail.length) * this.life * 0.5;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.size * (i / this.trail.length), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = this.life;
    ctx.shadowBlur = 18;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function createFirework(x, y) {
  const baseColor = colors.fireworks[Math.floor(Math.random() * colors.fireworks.length)];
  const count = 60 + Math.floor(Math.random() * 30);
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.3;
    const speed = 2 + Math.random() * 5;
    const color = Math.random() < 0.7 ? baseColor : colors.fireworks[Math.floor(Math.random() * colors.fireworks.length)];
    particles.push(new FireworkParticle(x, y, angle, speed, color));
  }
  // 二次小爆
  setTimeout(() => {
    const count2 = 20;
    const c2 = colors.fireworks[Math.floor(Math.random() * colors.fireworks.length)];
    for (let i = 0; i < count2; i++) {
      const angle = (Math.PI * 2 / count2) * i;
      particles.push(new FireworkParticle(x, y, angle, 1.5 + Math.random(), c2));
    }
  }, 200);
}

// ========== 涟漪 ==========
class Ripple {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.radius = 0;
    this.maxRadius = 200 + Math.random() * 120;
    this.life = 1;
    this.color = colors.ripples[Math.floor(Math.random() * colors.ripples.length)];
    this.speed = 2.5 + Math.random();
    this.type = 'ripple';
  }
  update() {
    this.radius += this.speed;
    this.life = 1 - this.radius / this.maxRadius;
  }
  draw(ctx) {
    ctx.strokeStyle = this.color;
    ctx.globalAlpha = this.life * 0.7;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.stroke();

    ctx.globalAlpha = this.life * 0.4;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.72, 0, Math.PI * 2);
    ctx.stroke();

    ctx.globalAlpha = this.life * 0.25;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.45, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// ========== 花开 ==========
class Bloom {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.size = 0;
    this.maxSize = 32 + Math.random() * 28;
    this.life = 1;
    this.petalCount = 5 + Math.floor(Math.random() * 3);
    this.rotation = Math.random() * Math.PI * 2;
    this.petalColor = colors.blooms.petal[Math.floor(Math.random() * colors.blooms.petal.length)];
    this.centerColor = colors.blooms.center[Math.floor(Math.random() * colors.blooms.center.length)];
    this.growSpeed = 0.09;
    this.type = 'bloom';
    this.fadeStart = false;
    this.holdTime = 60 + Math.random() * 40;
    this.age = 0;
  }
  update() {
    this.age++;
    if (this.size < this.maxSize - 0.5) {
      this.size += (this.maxSize - this.size) * this.growSpeed;
    } else if (this.age > this.holdTime) {
      this.life -= 0.006;
    }
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = this.life * 0.92;

    // 花瓣
    for (let i = 0; i < this.petalCount; i++) {
      const angle = (Math.PI * 2 / this.petalCount) * i;
      ctx.save();
      ctx.rotate(angle);
      const grad = ctx.createRadialGradient(0, this.size * 0.55, 0, 0, this.size * 0.55, this.size);
      grad.addColorStop(0, this.petalColor);
      grad.addColorStop(0.6, this.petalColor);
      grad.addColorStop(1, this.petalColor + '00');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(0, this.size * 0.55, this.size * 0.42, this.size * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // 花蕊底色
    ctx.fillStyle = this.centerColor;
    ctx.beginPath();
    ctx.arc(0, 0, this.size * 0.26, 0, Math.PI * 2);
    ctx.fill();

    // 蕊点
    ctx.fillStyle = '#9d2933';
    for (let i = 0; i < 7; i++) {
      const a = (Math.PI * 2 / 7) * i;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * this.size * 0.16, Math.sin(a) * this.size * 0.16, this.size * 0.045, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ========== 鼠标事件 ==========
canvas.addEventListener('mousedown', e => {
  isDrawing = true;
  lastX = e.clientX;
  lastY = e.clientY;
  lastTime = Date.now();

  if (mode === 'firework') {
    createFirework(e.clientX, e.clientY);
  } else if (mode === 'ripple') {
    particles.push(new Ripple(e.clientX, e.clientY));
    setTimeout(() => particles.push(new Ripple(e.clientX, e.clientY)), 180);
    setTimeout(() => particles.push(new Ripple(e.clientX, e.clientY)), 360);
  } else if (mode === 'bloom') {
    particles.push(new Bloom(e.clientX, e.clientY));
    for (let i = 0; i < 4; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = 35 + Math.random() * 60;
      setTimeout(() => particles.push(new Bloom(e.clientX + Math.cos(a) * r, e.clientY + Math.sin(a) * r)), 80 + i * 100);
    }
  } else if (mode === 'ink') {
    drawInk(e.clientX, e.clientY, e.clientX - 0.1, e.clientY, 5);
  } else if (mode === 'petals') {
    // 起手散一把
    scatterSakura(e.clientX, e.clientY, 3);
  }
});

canvas.addEventListener('mouseup', () => { isDrawing = false; });
canvas.addEventListener('mouseleave', () => { isDrawing = false; });

canvas.addEventListener('mousemove', e => {
  const x = e.clientX, y = e.clientY;
  mouseX = x;
  mouseY = y;

  if (mode === 'ink' && isDrawing) {
    const now = Date.now();
    const dt = Math.max(1, now - lastTime);
    const dx = x - lastX, dy = y - lastY;
    const speed = Math.sqrt(dx*dx + dy*dy) / dt * 16;
    drawInk(x, y, lastX, lastY, speed);
    lastX = x; lastY = y; lastTime = now;
  }
});

// 触摸支持
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousedown', {clientX: t.clientX, clientY: t.clientY}));
  e.preventDefault();
}, {passive: false});
canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousemove', {clientX: t.clientX, clientY: t.clientY}));
  e.preventDefault();
}, {passive: false});
canvas.addEventListener('touchend', () => {
  canvas.dispatchEvent(new MouseEvent('mouseup'));
});

// ========== 模式切换 ==========
document.querySelectorAll('.modes button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.modes button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    document.getElementById('hint').textContent = hints[mode];

    if (mode === 'petals') {
      document.body.classList.add('dusk');
    } else {
      document.body.classList.remove('dusk');
    }
  });
});

document.getElementById('clearBtn').addEventListener('click', () => {
  particles = [];
  groundPetals = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
});

// ========== 动画循环 ==========
function animate() {
  if (mode === 'petals') {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 绘制地面积瓣
    groundPetals.forEach(gp => {
      gp.alpha *= 0.998;
      if (gp.alpha > 0.05) {
        ctx.globalAlpha = gp.alpha;
        ctx.fillStyle = gp.color;
        ctx.save();
        ctx.translate(gp.x, gp.y);
        ctx.rotate(gp.rotation);
        ctx.scale(0.7, 0.4);
        ctx.beginPath();
        ctx.arc(0, 0, gp.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    });
    groundPetals = groundPetals.filter(gp => gp.alpha > 0.05);
    ctx.globalAlpha = 1;

    // 持续散花：按住鼠标时每帧撒1片
    if (isDrawing && particles.length < 500) {
      scatterSakura(mouseX, mouseY, 1);
    }

    // 一次遍历：更新 + 绘制 + 积瓣处理
    const survivors = [];
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.update();
      p.draw(ctx);
      if (p.life > 0) {
        survivors.push(p);
      } else if (p.type === 'sakura' && p.state === 'grounded' && groundPetals.length < MAX_GROUND) {
        groundPetals.push({
          x: p.x, y: p.y, rotation: p.rotation,
          size: p.size * 0.6, color: p.frontColor, alpha: 0.35
        });
      }
    }
    particles = survivors;
    ctx.globalAlpha = 1;

  } else {
    // 非落英模式
    if (mode !== 'ink') {
      ctx.fillStyle = 'rgba(245, 230, 211, 0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    particles = particles.filter(p => {
      p.update();
      p.draw(ctx);
      return p.life > 0;
    });
  }

  requestAnimationFrame(animate);
}
animate();
</script>
