<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>秋天的树</title>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, treeCache = null;

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  treeCache = null;
}
resize();
addEventListener('resize', resize);

const leafColors = ['#e74c3c','#c0392b','#e67e22','#d35400','#f39c12','#f1c40f','#cc5533','#d4763a','#b5651d','#a0522d'];

// Seeded random for deterministic tree
let seed;
function srand() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

function buildTree() {
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const c = off.getContext('2d');
  const bx = W / 2, by = H * 0.82, top = by - H * 0.28;

  // Trunk
  c.strokeStyle = '#3d2b1f'; c.lineWidth = 24; c.lineCap = 'round';
  c.beginPath(); c.moveTo(bx, by);
  c.quadraticCurveTo(bx - 6, by - H * 0.14, bx + 2, top);
  c.stroke();

  // Branches
  const ends = [];
  seed = 54321;
  (function branch(x, y, len, ang, dep) {
    if (dep === 0 || len < 2) return;
    const ex = x + Math.sin(ang) * len, ey = y - Math.cos(ang) * len;
    c.beginPath(); c.moveTo(x, y); c.lineTo(ex, ey);
    c.strokeStyle = dep > 4 ? '#3d2b1f' : '#6b4e37';
    c.lineWidth = dep * 2; c.lineCap = 'round'; c.stroke();
    if (dep <= 3) ends.push({x: ex, y: ey, d: dep});
    const s1 = 0.65 + srand() * 0.12, s2 = 0.65 + srand() * 0.12, sp = 0.3 + srand() * 0.3;
    branch(ex, ey, len * s1, ang - sp, dep - 1);
    branch(ex, ey, len * s2, ang + sp, dep - 1);
    if (dep > 5 && srand() > 0.4) branch(ex, ey, len * 0.5, ang + (srand() - 0.5) * 0.6, dep - 2);
  })(bx + 2, top, H * 0.13, 0, 9);

  // Canopy clusters - deterministic using srand
  seed = 99999;
  for (const b of ends) {
    const r = 10 + b.d * 9;
    for (let i = 0; i < 4; i++) {
      const ox = (srand() - 0.5) * r * 0.6, oy = (srand() - 0.5) * r * 0.6;
      c.globalAlpha = 0.75;
      c.fillStyle = leafColors[srand() * leafColors.length | 0];
      c.beginPath(); c.arc(b.x + ox, b.y + oy, r * 0.65, 0, Math.PI * 2); c.fill();
    }
  }
  c.globalAlpha = 1;
  return off;
}

// Ground leaves (static)
let groundLeaves = [];
function initGround() {
  groundLeaves = [];
  for (let i = 0; i < 120; i++) {
    groundLeaves.push({
      x: Math.random() * W * 1.1 - W * 0.05,
      y: H * 0.85 + Math.random() * H * 0.15,
      s: 3 + Math.random() * 6,
      c: leafColors[Math.random() * leafColors.length | 0],
      a: Math.random() * 6.28,
      o: 0.3 + Math.random() * 0.4
    });
  }
}
initGround();

// Falling leaf
class Leaf {
  constructor(init) { this.reset(init); }
  reset(init) {
    if (init) { this.x = Math.random() * W; this.y = Math.random() * H * 0.7; }
    else if (Math.random() < 0.6) {
      this.x = W / 2 + (Math.random() - 0.5) * W * 0.3;
      this.y = H * 0.12 + Math.random() * H * 0.25;
    } else { this.x = Math.random() * W; this.y = -15; }
    this.s = 5 + Math.random() * 8;
    this.c = leafColors[Math.random() * leafColors.length | 0];
    this.vy = 0.3 + Math.random() * 0.7;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.ang = Math.random() * 6.28;
    this.spin = (Math.random() - 0.5) * 0.05;
    this.sA = 0.6 + Math.random() * 1.2;
    this.sF = 0.012 + Math.random() * 0.015;
    this.ph = Math.random() * 6.28;
    this.op = 0.7 + Math.random() * 0.3;
    this.sh = Math.random() * 3 | 0;
    this.t = 0;
  }
  update() {
    this.t++;
    this.x += this.vx + Math.sin(this.t * this.sF + this.ph) * this.sA;
    this.y += this.vy;
    this.ang += this.spin + Math.sin(this.t * 0.025) * 0.008;
    this.vx += (Math.random() - 0.48) * 0.01;
    this.vx *= 0.995;
    if (this.y > H + 15) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.ang);
    ctx.globalAlpha = this.op;
    ctx.fillStyle = this.c;
    ctx.beginPath();
    const s = this.s;
    if (this.sh === 0) {
      ctx.ellipse(0, 0, s * 0.4, s, 0, 0, Math.PI * 2);
    } else if (this.sh === 1) {
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * 6.28 - 1.57, r = s * (i % 2 === 0 ? 1 : 0.5);
        i === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
    } else {
      ctx.moveTo(0, -s * 0.4);
      ctx.bezierCurveTo(s * 0.6, -s, s * 0.6, -s * 0.2, 0, s * 0.6);
      ctx.moveTo(0, -s * 0.4);
      ctx.bezierCurveTo(-s * 0.6, -s, -s * 0.6, -s * 0.2, 0, s * 0.6);
    }
    ctx.fill();
    ctx.restore();
  }
}

const leaves = [];
for (let i = 0; i < 80; i++) leaves.push(new Leaf(true));

function animate() {
  requestAnimationFrame(animate);

  // Sky
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#f4a460'); bg.addColorStop(0.4, '#e8967a');
  bg.addColorStop(0.7, '#dda0a0'); bg.addColorStop(1, '#c4b5d0');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Sun
  const sg = ctx.createRadialGradient(W * 0.73, H * 0.08, 10, W * 0.73, H * 0.08, H * 0.28);
  sg.addColorStop(0, 'rgba(255,235,170,0.7)');
  sg.addColorStop(0.5, 'rgba(255,210,130,0.15)');
  sg.addColorStop(1, 'transparent');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = '#5a4a2a';
  ctx.beginPath(); ctx.moveTo(0, H * 0.85);
  ctx.quadraticCurveTo(W * 0.3, H * 0.82, W / 2, H * 0.84);
  ctx.quadraticCurveTo(W * 0.7, H * 0.86, W, H * 0.83);
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();

  // Static ground leaves
  for (const g of groundLeaves) {
    ctx.save(); ctx.translate(g.x, g.y); ctx.rotate(g.a);
    ctx.globalAlpha = g.o; ctx.fillStyle = g.c;
    ctx.beginPath(); ctx.ellipse(0, 0, g.s * 0.4, g.s, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.restore();
  }

  // Tree (cached)
  if (!treeCache) { treeCache = buildTree(); initGround(); }
  ctx.drawImage(treeCache, 0, 0);

  // Spawn
  if (leaves.length < 120 && Math.random() < 0.1) leaves.push(new Leaf(false));

  // Falling leaves
  for (const l of leaves) { l.update(); l.draw(); }
  ctx.globalAlpha = 1;
}
animate();
</script>
</body>
</html>
